<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>TheLeBerton</title>
		<link rel="stylesheet" href="style.css">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
		<script type="module" src="script.js"></script>
	</head>
	<body>
		<main>
			<section id="hero">
				<div class="screen" id="terminal">
					<div class="output">
						<div class="line">
							<span class="ps1"></span>
							<h1 data-typewriter>TheLeBerton</h1>
						</div>
						<div class="line">
							<span class="ps1"></span>
							<p data-typewriter>student at 42 Vienna - C / C++ / C# / Python</p>
						</div>
						<div class="line">
							<span class="ps1"></span>
							<p data-typewriter>loves working on a terminal and solving problems.</p>
						</div>
					</div>
					<div class="line input-line" hidden>
						<span class="ps1"></span>
						<input class="cmd" type="text" autocomplete="off" spellcheck="false" aria-label="terminal command">
					</div>
				</div>
			</section>
		</main>
	</body>
</html>
